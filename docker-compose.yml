services:
  api:
    build: ./apps/api
    ports:
      - "8080:8080"
    env_file: .env.example
    environment:
      DATA_DIR: /data
      NATS_URL: nats://nats:4222
    volumes:
      - api-data:/data
    depends_on:
      - nats
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: ./apps/dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  surrealdb:
    image: surrealdb/surrealdb:latest
    command: start --user root --pass root memory
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agennext
      POSTGRES_PASSWORD: agennext
      POSTGRES_DB: agennext
    volumes:
      - postgres-data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: agennext
      DB_POSTGRESDB_USER: agennext
      DB_POSTGRESDB_PASSWORD: agennext
      N8N_ENCRYPTION_KEY: change-me-in-production
      N8N_SECURE_COOKIE: "false"
    depends_on:
      - postgres

  langflow:
    image: langflowai/langflow:latest
    ports:
      - "7860:7860"

volumes:
  api-data:
  postgres-data:

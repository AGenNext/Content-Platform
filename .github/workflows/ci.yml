name: ci
on:
  push:
  pull_request:
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r apps/api/requirements.txt
      - run: python -m compileall apps/api/app
      - run: cd apps/api && PYTHONPATH=. pytest -q
  connectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd packages/connectors && npm install && npm run build

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agennext-content-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: agennext-content-api
  template:
    metadata:
      labels:
        app: agennext-content-api
    spec:
      containers:
        - name: api
          image: {{ .Values.image.api }}
          ports:
            - containerPort: {{ .Values.api.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: agennext-content-api
spec:
  selector:
    app: agennext-content-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
